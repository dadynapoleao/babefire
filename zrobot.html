<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator JSON - Auto-Sync GitHub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; border: 1px solid #ccc; border-radius: 5px; padding: 12px; font-family: monospace; box-sizing: border-box; margin-bottom: 10px; outline-color: #007bff; }
        .controls { margin: 15px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        button { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: opacity 0.3s; }
        button:hover { opacity: 0.8; }
        
        .btn-generate { background-color: #007bff; }
        .btn-github { background-color: #00ffff; color: #000; border: 1px solid #000; } /* Estilo do botão GitHub */
        .btn-copy { background-color: #28a745; }
        .btn-reset { background-color: #6c757d; }
        
        #status-badge { padding: 8px 15px; border-radius: 5px; font-weight: bold; display: none; }
        .status-new { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-duplicate { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; font-size: 1.1rem; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #output { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; white-space: pre; border: 1px solid #333; margin-top: 10px; min-height: 50px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de JSON & Sync Cloud</h2>
    
    <label>Cole a Bio aqui:</label>
    <textarea id="inputText" placeholder="Cole os dados brutos aqui..."></textarea>
    
    <div class="controls">
        <button class="btn-generate" onclick="processData()">1. Gerar Dados</button>
        <button id="btnSync" class="btn-github" onclick="saveNewSheToGitHub()" style="display:none;">2. Enviar p/ GitHub</button>
        <button class="btn-reset" onclick="resetPage()">Limpar / Novo</button>
        <div id="status-badge"></div>
    </div>

    <label>Preview do Objeto:</label>
    <div id="output">O JSON aparecerá aqui...</div>
</div>

<script>
// CONFIGURAÇÕES GITHUB
const GITHUB_USER = 'dadynapoleao';
const GITHUB_REPO = 'babefire';
const GITHUB_PATH = 'js/she.json';
// SUA CHAVE DIRETAMENTE AQUI
const GITHUB_TOKEN = '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';

let existingDatabase = [];
let currentProfile = null; // Armazena a última She gerada

// Carrega o banco de dados para evitar duplicatas
async function loadDatabase() {
    try {
        const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GITHUB_PATH}?t=` + new Date().getTime());
        if (response.ok) {
            existingDatabase = await response.json();
            console.log("Banco carregado:", existingDatabase.length);
        }
    } catch (e) { console.warn("Erro ao ler banco remoto."); }
}

function resetPage() {
    document.getElementById('inputText').value = "";
    document.getElementById('output').innerText = "O JSON aparecerá aqui...";
    document.getElementById('status-badge').style.display = 'none';
    document.getElementById('btnSync').style.display = 'none';
    currentProfile = null;
    document.getElementById('inputText').focus();
}

function processData() {
    const textRaw = document.getElementById('inputText').value.trim();
    if (!textRaw) return;

    const find = (regex) => {
        const match = textRaw.match(regex);
        return match ? match[1].trim() : null;
    };

    const name = textRaw.split('\n')[0].trim().replace(/\s+/g, ' ');
    const isDuplicate = existingDatabase.some(item => item.Name.trim().toLowerCase() === name.toLowerCase());

    const statusBadge = document.getElementById('status-badge');
    statusBadge.style.display = 'block';
    
    if (isDuplicate) {
        statusBadge.innerText = "⚠️ JÁ EXISTE NO ARQUIVO!";
        statusBadge.className = "status-duplicate";
        document.getElementById('btnSync').style.display = 'none';
    } else {
        statusBadge.innerText = "✅ NOVA ATRIZ (ÚNICA)";
        statusBadge.className = "status-new";
        document.getElementById('btnSync').style.display = 'inline-block';
    }

    const rawBirthplace = find(/Birthplace:\s*([^\n\r]+)/);
    let country = "";
    if (rawBirthplace) {
        const parts = rawBirthplace.split(',');
        country = parts[parts.length - 1].trim();
    }

    const monthMap = {
        January: 1, February: 2, March: 3, April: 4, May: 5, June: 6,
        July: 7, August: 8, September: 9, October: 10, November: 11, December: 12
    };
    const dateMatch = textRaw.match(/(\d+)(?:st|nd|rd|th)\s+of\s+(\w+)\s+(\d{4})/);
    let formattedDate = "";
    if (dateMatch) {
        formattedDate = `${dateMatch[1]}/${monthMap[dateMatch[2]]}/${dateMatch[3]}`;
    }

    const measurementsRaw = find(/Measurements:\s*([^\n\s]+)/);
    let boobs = "", hips = "", ass = "", total = 0;

    if (measurementsRaw) {
        const mParts = measurementsRaw.split('-');
        if (mParts.length === 3) {
            const nBoobs = parseInt(mParts[0].replace(/\D/g, '')) || 0;
            const nHips = parseInt(mParts[1].replace(/\D/g, '')) || 0;
            const nAss = parseInt(mParts[2].replace(/\D/g, '')) || 0;
            boobs = nBoobs.toString();
            hips = nHips.toString();
            ass = nAss.toString();
            total = (nBoobs + nAss) - nHips;
        }
    }

    currentProfile = {
        "Name": name,
        "Born": formattedDate,
        "Years active": find(/Years active:\s*(\d{4})/),
        "Birthplace": country,
        "Ethnicity": find(/Ethnicity:\s*([^\n\r]+)/),
        "Hair color": find(/Hair color:\s*([^\n\r]+)/),
        "Eye color": find(/Eye color:\s*([^\n\r]+)/),
        "Height": find(/or\s*(\d+)\s*cm/) || find(/Height:\s*(\d+)\s*cm/),
        "Weight": find(/or\s*(\d+)\s*kg/) || find(/Weight:\s*(\d+)\s*kg/),
        "Body type": find(/Body type:\s*([^\n\r]+)/),
        "Measurements": measurementsRaw,
        "Boobs": boobs,
        "Hips": hips,
        "Ass": ass,
        "Total": total,
        "tattoos": (textRaw.match(/Tattoos:\s*(.+)/i) && !textRaw.match(/Tattoos:\s*None/i)) ? true : false,
        "piercings": (textRaw.match(/Piercings:\s*(.+)/i) && !textRaw.match(/Piercings:\s*None/i)) ? true : false,
        "Image": "",
        "ImagePosition": "50% 50%"
    };

    document.getElementById('output').innerText = JSON.stringify(currentProfile, null, 4);
}

// FUNÇÃO PARA SALVAR NO GITHUB
async function saveNewSheToGitHub() {
    if (!currentProfile) return;

    const btn = document.getElementById('btnSync');
    btn.innerText = "ENVIANDO...";
    btn.disabled = true;

    try {
        // 1. Obter o SHA atual do arquivo she.json
        const getFile = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        
        if (!getFile.ok) throw new Error("Erro ao acessar o arquivo no GitHub.");
        
        const fileData = await getFile.json();
        const sha = fileData.sha;

        // 2. Adicionar o novo perfil ao banco de dados carregado
        existingDatabase.push(currentProfile);

        // 3. Preparar o JSON completo e codificar em Base64
        const newContent = JSON.stringify(existingDatabase, null, 4);
        const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

        // 4. Enviar de volta para o GitHub
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: `Add new She: ${currentProfile.Name}`,
                content: encodedContent,
                sha: sha
            })
        });

        if (response.ok) {
            alert("✅ SUCESSO! Banco de dados atualizado automaticamente.");
            resetPage();
            loadDatabase(); // Recarrega a lista interna
        } else {
            const error = await response.json();
            throw new Error(error.message);
        }
    } catch (err) {
        alert("Erro Crítico: " + err.message);
        console.error(err);
    } finally {
        btn.innerText = "2. Enviar p/ GitHub";
        btn.disabled = false;
    }
}


loadDatabase();
</script>

</body>
</html>
