<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator JSON - Modo Apêndice</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; border: 1px solid #ccc; border-radius: 5px; padding: 12px; font-family: monospace; box-sizing: border-box; margin-bottom: 10px; outline-color: #007bff; }
        .controls { margin: 15px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        button { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: opacity 0.3s; }
        button:hover { opacity: 0.8; }
        
        .btn-generate { background-color: #007bff; }
        .btn-copy { background-color: #28a745; }
        .btn-reset { background-color: #6c757d; }
        
        #status-badge { padding: 8px 15px; border-radius: 5px; font-weight: bold; display: none; }
        .status-new { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-duplicate { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; font-size: 1.1rem; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #output { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; white-space: pre; border: 1px solid #333; margin-top: 10px; min-height: 50px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de JSON (Formato ,{ )</h2>
    
    <label>Cole a Bio aqui:</label>
    <textarea id="inputText" placeholder="Cole os dados brutos aqui..."></textarea>
    
    <div class="controls">
        <button class="btn-generate" onclick="processData()">Gerar JSON</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copiar JSON</button>
        <button class="btn-reset" onclick="resetPage()">Limpar / Novo</button>
        <div id="status-badge"></div>
    </div>

    <label>Resultado (Pronto para colar):</label>
    <div id="output">O JSON aparecerá aqui...</div>
</div>

<script>
let existingDatabase = [];

// Carrega o banco de dados para evitar duplicatas
async function loadDatabase() {
    try {
        const response = await fetch('js/she.json?t=' + new Date().getTime());
        if (response.ok) {
            existingDatabase = await response.json();
            console.log("Banco carregado:", existingDatabase.length);
        }
    } catch (e) { console.warn("Erro ao ler banco local."); }
}

function resetPage() {
    document.getElementById('inputText').value = "";
    document.getElementById('output').innerText = "O JSON aparecerá aqui...";
    document.getElementById('status-badge').style.display = 'none';
    document.getElementById('inputText').focus();
}

function processData() {
    const textRaw = document.getElementById('inputText').value.trim();
    if (!textRaw) return;

    const find = (regex) => {
        const match = textRaw.match(regex);
        return match ? match[1].trim() : null;
    };

    // Extração e normalização do Nome
    const name = textRaw.split('\n')[0].trim().replace(/\s+/g, ' ');

    // Verificação de duplicata
    const statusBadge = document.getElementById('status-badge');
    const isDuplicate = existingDatabase.some(item => item.Name.trim().toLowerCase() === name.toLowerCase());

    statusBadge.style.display = 'block';
    if (isDuplicate) {
        statusBadge.innerText = "⚠️ JÁ EXISTE NO ARQUIVO!";
        statusBadge.className = "status-duplicate";
    } else {
        statusBadge.innerText = "✅ NOVA ATRIZ (ÚNICA)";
        statusBadge.className = "status-new";
    }

    // Extração de data e país
    const rawBirthplace = find(/Birthplace:\s*([^\n\r]+)/);
    let country = "";
    if (rawBirthplace) {
        const parts = rawBirthplace.split(',');
        country = parts[parts.length - 1].trim();
    }

    const monthMap = {
        January: 1, February: 2, March: 3, April: 4, May: 5, June: 6,
        July: 7, August: 8, September: 9, October: 10, November: 11, December: 12
    };
    const dateMatch = textRaw.match(/(\d+)(?:st|nd|rd|th)\s+of\s+(\w+)\s+(\d{4})/);
    let formattedDate = "";
    if (dateMatch) {
        formattedDate = `${dateMatch[1]}/${monthMap[dateMatch[2]]}/${dateMatch[3]}`;
    }

    const measurementsRaw = find(/Measurements:\s*([^\n\s]+)/);
    let boobs = "", hips = "", ass = "", total = 0;

    if (measurementsRaw) {
        const mParts = measurementsRaw.split('-');
        if (mParts.length === 3) {
            const nBoobs = parseInt(mParts[0].replace(/\D/g, '')) || 0;
            const nHips = parseInt(mParts[1].replace(/\D/g, '')) || 0;
            const nAss = parseInt(mParts[2].replace(/\D/g, '')) || 0;
            boobs = nBoobs.toString();
            hips = nHips.toString();
            ass = nAss.toString();
            total = (nBoobs + nAss) - nHips;
        }
    }

    const profile = {
        "Name": name,
        "Born": formattedDate,
        "Years active": find(/Years active:\s*(\d{4})/),
        "Birthplace": country,
        "Ethnicity": find(/Ethnicity:\s*([^\n\r]+)/),
        "Hair color": find(/Hair color:\s*([^\n\r]+)/),
        "Eye color": find(/Eye color:\s*([^\n\r]+)/),
        "Height": find(/or\s*(\d+)\s*cm/) || find(/Height:\s*(\d+)\s*cm/),
        "Weight": find(/or\s*(\d+)\s*kg/) || find(/Weight:\s*(\d+)\s*kg/),
        "Body type": find(/Body type:\s*([^\n\r]+)/),
        "Measurements": measurementsRaw,
        "Boobs": boobs,
        "Hips": hips,
        "Ass": ass,
        "Total": total,
        "Tattoos": (textRaw.match(/Tattoos:\s*(.+)/i) && !textRaw.match(/Tattoos:\s*None/i)) ? "Yes" : "No",
        "Piercings": (textRaw.match(/Piercings:\s*(.+)/i) && !textRaw.match(/Piercings:\s*None/i)) ? "Yes" : "No",
        "Image": ""
    };

    // FORMATAÇÃO COM A VÍRGULA NO INÍCIO
    const jsonString = JSON.stringify(profile, null, 4);
    document.getElementById('output').innerText = "," + jsonString;
}

function copyToClipboard() {
    const output = document.getElementById('output');
    const btn = document.getElementById('copyBtn');
    const text = output.innerText;

    if (text.includes("{")) {
        navigator.clipboard.writeText(text).then(() => {
            const old = btn.innerText;
            btn.innerText = "Copiado!";
            setTimeout(() => btn.innerText = old, 1500);
        });
    }
}

loadDatabase();
</script>

</body>
</html>
