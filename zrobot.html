<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator JSON Silencioso</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 180px; border: 1px solid #ccc; border-radius: 5px; padding: 12px; font-family: monospace; box-sizing: border-box; margin-bottom: 10px; }
        .controls { margin: 15px 0; display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background-color: #007bff; color: white; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        /* Estilo do botão de cópia */
        .btn-copy { background-color: #28a745; min-width: 130px; }
        .btn-copy:hover { background-color: #218838; }
        .btn-copy.success { background-color: #155724; } /* Cor quando copiado */
        
        #output { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; white-space: pre; border: 1px solid #333; margin-top: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de JSON</h2>
    
    <label>Cole a Bio aqui:</label>
    <textarea id="inputText" placeholder="Cole os dados brutos aqui..."></textarea>
    
    <div class="controls">
        <button onclick="processData()">Gerar JSON</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">Copiar JSON</button>
    </div>

    <label>Resultado:</label>
    <div id="output">O JSON aparecerá aqui...</div>
</div>

<script>
function processData() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) return;

    const find = (regex) => {
        const match = text.match(regex);
        return match ? match[1].trim() : null;
    };

    const rawBirthplace = find(/Birthplace:\s*([^\n\r]+)/);
    let country = "";
    if (rawBirthplace) {
        const parts = rawBirthplace.split(',');
        country = parts[parts.length - 1].trim();
    }

    const monthMap = {
        January: 1, February: 2, March: 3, April: 4, May: 5, June: 6,
        July: 7, August: 8, September: 9, October: 10, November: 11, December: 12
    };
    const dateMatch = text.match(/(\d+)(?:st|nd|rd|th)\s+of\s+(\w+)\s+(\d{4})/);
    let formattedDate = "";
    if (dateMatch) {
        formattedDate = `${dateMatch[1]}/${monthMap[dateMatch[2]]}/${dateMatch[3]}`;
    }

    const measurementsRaw = find(/Measurements:\s*([^\n\s]+)/);
    let boobs = "", hips = "", ass = "", total = 0;

    if (measurementsRaw) {
        const mParts = measurementsRaw.split('-');
        if (mParts.length === 3) {
            const nBoobs = parseInt(mParts[0].replace(/\D/g, '')) || 0;
            const nHips = parseInt(mParts[1].replace(/\D/g, '')) || 0;
            const nAss = parseInt(mParts[2].replace(/\D/g, '')) || 0;
            boobs = nBoobs.toString();
            hips = nHips.toString();
            ass = nAss.toString();
            total = (nBoobs + nAss) - nHips;
        }
    }

    const hasTattoos = (text.match(/Tattoos:\s*(.+)/i) && !text.match(/Tattoos:\s*None/i)) ? "Yes" : "No";
    const hasPiercings = (text.match(/Piercings:\s*(.+)/i) && !text.match(/Piercings:\s*None/i)) ? "Yes" : "No";

    const profile = {
        "Name": text.split('\n')[0].trim(),
        "Born": formattedDate,
        "Years active": find(/Years active:\s*(\d{4})/),
        "Birthplace": country,
        "Ethnicity": find(/Ethnicity:\s*([^\n\r]+)/),
        "Hair color": find(/Hair color:\s*([^\n\r]+)/),
        "Eye color": find(/Eye color:\s*([^\n\r]+)/),
        "Height": find(/or\s*(\d+)\s*cm/) || find(/Height:\s*(\d+)\s*cm/),
        "Weight": find(/or\s*(\d+)\s*kg/) || find(/Weight:\s*(\d+)\s*kg/),
        "Body type": find(/Body type:\s*([^\n\r]+)/),
        "Measurements": measurementsRaw,
        "Boobs": boobs,
        "Hips": hips,
        "Ass": ass,
        "Total": total,
        "Tattoos": hasTattoos,
        "Piercings": hasPiercings,
        "Image": ""
    };

    const jsonString = JSON.stringify(profile, null, 4);
    document.getElementById('output').innerText = jsonString + "";
}

function copyToClipboard() {
    const output = document.getElementById('output');
    const btn = document.getElementById('copyBtn');
    const text = output.innerText;

    if (text.includes("{")) {
        navigator.clipboard.writeText(text).then(() => {
            // Feedback visual no botão em vez do alert
            const originalText = btn.innerText;
            btn.innerText = "Copiado!";
            btn.classList.add("success");

            // Volta ao normal depois de 1.5 segundos
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove("success");
            }, 1500);
        });
    }
}
</script>

</body>
</html>
