<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - ARCHIVE SYSTEM</title>
    <style>
        :root { --glow: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Efeito de Scanline */
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; pointer-events: none; z-index: 1000; }

        header { border-bottom: 2px solid var(--glow); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.5rem; }
        
        .tabs { display: flex; gap: 10px; }
        .tab-link { background: transparent; border: 1px solid rgba(0, 255, 65, 0.3); color: var(--glow); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.8rem; text-transform: uppercase; }
        .tab-link.active { background: var(--glow); color: #000; box-shadow: 0 0 10px var(--glow); font-weight: bold; }

        .controls { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; border: 1px dashed rgba(0, 255, 65, 0.3); padding: 15px; }
        input, select { background: #000; border: 1px solid var(--glow); color: var(--glow); padding: 8px; outline: none; font-family: inherit; }
        button { background: transparent; border: 1px solid var(--glow); color: var(--glow); cursor: pointer; padding: 8px 15px; font-family: inherit; text-transform: uppercase; }
        button:hover { background: var(--glow); color: #000; }
        button.active { background: var(--glow); color: #000; }

        /* FILTROS */
        #filter-panel { display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 15px; border: 1px solid var(--glow); background: rgba(0, 255, 65, 0.05); }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }

        /* TABELAS */
        .view-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .view-list th { text-align: left; border-bottom: 1px solid var(--glow); padding: 10px; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; }
        .view-list td { padding: 10px; border-bottom: 1px solid rgba(0, 255, 65, 0.2); font-size: 0.85rem; }
        .view-list tr:hover td { background: rgba(0, 255, 65, 0.1); color: #fff; cursor: pointer; }

        /* CARDS */
        .view-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid var(--glow); padding: 15px; cursor: pointer; transition: 0.2s; background: #000; }
        .card:hover { box-shadow: 0 0 15px var(--glow); background: rgba(0, 255, 65, 0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border: 1px solid var(--glow); margin-bottom: 10px; filter: grayscale(1) brightness(0.8); }

        /* DETALHES (PERFIL E CENA) */
        #profile-page, #scene-detail-page { display: none; }
        .profile-header-name { font-size: 2.5rem; margin: 10px 0; border-bottom: 1px solid var(--glow); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 5px; }
        .profile-data-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .data-card { border: 1px solid var(--glow); padding: 10px 20px; background: rgba(0, 255, 65, 0.05); min-width: 100px; display: flex; flex-direction: column; align-items: center; }
        .data-card label { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; }
        .data-card span { font-size: 1.1rem; font-weight: bold; }

        .profile-main { display: flex; gap: 30px; margin-top: 20px; }
        .profile-img-large { width: 350px; border: 1px solid var(--glow); box-shadow: 0 0 20px var(--glow); }
        .profile-bio { flex: 1; border: 1px dashed rgba(0, 255, 65, 0.3); padding: 20px; font-size: 0.9rem; line-height: 1.6; max-height: 600px; overflow-y: auto; }

        .back-btn { margin-bottom: 20px; display: inline-block; text-decoration: none; color: var(--glow); border: 1px solid var(--glow); padding: 5px 15px; text-transform: uppercase; }
        .back-btn:hover { background: var(--glow); color: #000; }

        .search-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .search-links a { text-decoration: none; color: var(--glow); border: 1px solid rgba(0, 255, 65, 0.5); padding: 4px 10px; font-size: 0.75rem; }
        .search-links a:hover { background: var(--glow); color: #000; }

        .hidden { display: none !important; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: var(--glow); animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Tabela de cenas dentro do perfil */
        .scene-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .scene-table th { text-align: left; border-bottom: 1px solid var(--glow); font-size: 0.7rem; opacity: 0.7; padding: 5px; }
        .scene-table td { padding: 8px 5px; border-bottom: 1px solid rgba(0, 255, 65, 0.1); font-size: 0.8rem; }


        .cast-link { 
    color: var(--glow); 
    text-decoration: underline; 
    font-weight: bold; 
    cursor: pointer;
}
.cast-link:hover {
    background: var(--glow);
    color: #000;
}

.scene-link { 
    color: var(--glow); 
    text-decoration: underline; 
    cursor: pointer; 
}
.scene-link:hover { 
    background: var(--glow); 
    color: #000; 
}

.external-link {

    border: 1px solid #444;
    padding: 0 4px;

.btn-primary-search {

    display: inline-block;

}
.btn-primary-search:hover {

}

/* --- ESTILOS DO POPUP DE EDIÇÃO --- */

    display: none; justify-content: center; align-items: center;
}

    display: flex; flex-direction: column; gap: 15px;
}
.modal-header { font-size: 1.2rem; border-bottom: 1px solid var(--glow); padding-bottom: 10px; margin-bottom: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 0.7rem; color: var(--glow); opacity: 0.7; margin-bottom: 3px; }
.form-group input { background: #111; border: 1px solid #333; color: #fff; padding: 5px; }
.form-group input:focus { border-color: var(--glow); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
.btn-save { background: var(--glow); color: #000; font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; }
.btn-cancel { background: transparent; color: #888; border: 1px solid #444; padding: 10px 20px; cursor: pointer; }
.btn-cancel:hover { color: #fff; border-color: #fff; }


/* Botão pequeno ao lado do input */
.input-group { display: flex; gap: 5px; }
.btn-icon { background: #333; border: 1px solid var(--glow); color: var(--glow); cursor: pointer; padding: 5px 10px; }
.btn-icon:hover { background: var(--glow); color: #000; }

/* Modal de Posicionamento */
#pos-modal { z-index: 2100; /* Acima do modal de edição */ }
.preview-container {
    width: 300px; height: 180px; /* Mesmo tamanho do Card */
    border: 2px dashed var(--glow);
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background: #000;

.preview-image {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 50% 50%; /* Padrão */

.range-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
.range-group { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.range-group input { flex: 1; accent-color: var(--glow); }

    </style>
</head>

<script src="https://unpkg.com/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script>
        let database = [];
        let sceneDatabase = [];
        let currentMainTab = 'actrisses';
        let currentView = 'list';
        let sortCol = 'Name';
        let sortAsc = true;
 let isEditMode = false;
 let isDragging = false;
let selfieSegmentation;

        // --- HELPERS ---
        function calculateAge(dateString) {
            if (!dateString) return 0;
            const parts = dateString.split('/');
            const birthDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        // --- DATA LOADING ---
        async function loadData() {
            try {
                const resShe = await fetch('js/she.json?t=' + Date.now());
                database = await resShe.json();
                
                try {
                    const resScene = await fetch('js/scene.json?t=' + Date.now());
                    sceneDatabase = await resScene.json();
                } catch (e) { console.warn("scene.json not found"); }

                populateFilterOptions();
                handleRouting();
            } catch (e) { 
                document.getElementById('content').innerHTML = "> CRITICAL ERROR LOADING DATABASE"; 
            }
        }

        function populateFilterOptions() {
            const getUnique = (field) => [...new Set(database.map(item => item[field]))].filter(Boolean).sort();
            const fillSelect = (id, field) => {
                const select = document.getElementById(id);
                getUnique(field).forEach(val => select.innerHTML += `<option value="${val}">${val}</option>`);
            };
            fillSelect('f-ethnicity', 'Ethnicity');
            fillSelect('f-hair', 'Hair color');
            fillSelect('f-origin', 'Birthplace');
        }

        // --- NAVIGATION & TABS ---
        function switchMainTab(tab) {
            currentMainTab = tab;
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tab.toLowerCase());
            });
            
            // Ajustar controles
            document.getElementById('filter-toggle-btn').style.display = (tab === 'scenes') ? 'none' : 'inline-block';
            document.getElementById('filter-panel').style.display = 'none';
            
            render();
        }

        function setView(view) {
            currentView = view;
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            document.getElementById('btnCard').classList.toggle('active', view === 'card');
            render();
        }

        function toggleFilters() {
            const p = document.getElementById('filter-panel');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function resetFilters() {
            document.querySelectorAll('#filter-panel select').forEach(s => s.value = "");
            document.getElementById('searchInput').value = "";
            render();
        }

        // --- RENDERING ---
        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('content');

            if (currentMainTab === 'actrisses') {
                renderActresses(query, container);
            } else {
                renderScenes(query, container);
            }
        }


        function renderScenes(query, container) {
            let filtered = sceneDatabase.filter(s => 
                s.Name.toLowerCase().includes(query) || 
                (s.Cast && s.Cast.toLowerCase().includes(query)) ||
                (s.Studio && s.Studio.toLowerCase().includes(query))
            );

            // Ordenar por data (Recente -> Antigo)
            filtered.sort((a, b) => parseDate(b["Release date"]) - parseDate(a["Release date"]));

            // Limite de 100
            const limited = filtered.slice(0, 100);

            if (currentView === 'list') {
                let html = `<p style="font-size:0.7rem; opacity:0.6">> SHOWING ${limited.length} MOST RECENT ENTRIES</p>
                <table class="view-list"><thead><tr><th>SCENE NAME</th><th>STUDIO</th><th>RELEASE</th><th>CAST</th></tr></thead><tbody>`;
                limited.forEach(s => {
                    html += `<tr onclick="openScene('${encodeURIComponent(s.Name)}')">
                        <td>${s.Name}</td>
                        <td>${s.Studio}</td>
                        <td style="white-space:nowrap">${s["Release date"]}</td>
                        <td style="font-size:0.7rem; opacity:0.6">${s.Cast}</td></tr>`;
                });
                container.innerHTML = html + `</tbody></table>`;
            } else {
                let html = `<div class="view-cards">`;
                limited.forEach(s => {
                    html += `<div class="card" onclick="openScene('${encodeURIComponent(s.Name)}')">
                        <img src="${s.Image || 'https://via.placeholder.com/300x180?text=SCENE+IMAGE'}">
                        <strong>${s.Name}</strong><br>
                        <small>${s.Studio} | ${s["Release date"]}</small></div>`;
                });
                container.innerHTML = html + `</div>`;
            }
        }

        // --- DETAIL PAGES ---
        function openProfile(n) { window.location.hash = `profile=${encodeURIComponent(n)}`; }
        function openScene(n) { window.location.hash = `scene=${n}`; }

      function showProfilePage(p) {
    document.getElementById('main-page').classList.add('hidden');
    document.getElementById('scene-detail-page').style.display = 'none'; // Esconde página de cena se estiver aberta
    document.getElementById('profile-page').style.display = 'block';

    // Filtrar cenas da atriz no banco de dados de cenas
    let related = sceneDatabase.filter(s => s.Cast && s.Cast.toLowerCase().includes(p.Name.toLowerCase()));
    
    // Ordenar por data (Recente -> Antigo)
    related.sort((a,b) => parseDate(b["Release date"]) - parseDate(a["Release date"]));

    let scenesHtml = `
        <table class="scene-table">
            <thead>
                <tr>
                    <th>SCENE NAME</th>
                    <th>DATE</th>
                    <th>SEARCH</th>
                </tr>
            </thead>
            <tbody>`;

related.forEach(s => {
        const qFull = encodeURIComponent(`${s.Cast} ${s.Name}`);
        const qTitle = s.Name.trim().replace(/\s+/g, '+');
        const sceneNameEncoded = encodeURIComponent(s.Name);

        scenesHtml += `
            <tr>
                <td onclick="openScene('${sceneNameEncoded}')" class="scene-link">

        function startDrag(e) {
            isDragging = true;
            const box = document.getElementById('preview-box');
            
            // Função interna para mover
            function onMouseMove(evt) {
                if (!isDragging) return;
                const rect = box.getBoundingClientRect();
                
                // Calcular posição do mouse relativa à caixa (0 a 1)
                let x = (evt.clientX - rect.left) / rect.width;
                let y = (evt.clientY - rect.top) / rect.height;

                // Limitar entre 0 e 1
                x = Math.max(0, Math.min(1, x));
                y = Math.max(0, Math.min(1, y));

                // Converter para porcentagem
                const xPct = Math.round(x * 100);
                const yPct = Math.round(y * 100);

                // Atualizar sliders e imagem
                document.getElementById('pos-x').value = xPct;
                document.getElementById('pos-y').value = yPct;
                document.getElementById('pos-preview-img').style.objectPosition = `${xPct}% ${yPct}%`;
            }

            // Função interna para parar
            function onMouseUp() {
                isDragging = false;
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        }

function openPurgeTool() {
    const imgUrl = document.getElementById('e-image').value;
    if (!imgUrl) return alert("Enter Image URL first.");

    const canvas = document.getElementById('purge-canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.crossOrigin = "Anonymous"; // Tenta contornar bloqueios de imagem
    
    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        document.getElementById('purge-modal').style.display = 'flex';
    };
    
    img.onerror = function() {
        alert("CORS ERROR: This website blocks image scanning. Try hosting the image on Imgur or using a local file.");
    };
    
    img.src = imgUrl;

    // Lógica de clique no canvas para remover cor
    canvas.onclick = function(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const targetPos = (y * canvas.width + x) * 4;
        
        const r = data[targetPos];
        const g = data[targetPos+1];
        const b = data[targetPos+2];
        const tol = document.getElementById('purge-tol').value;

        // Varre a imagem e torna transparente cores similares à clicada
        for (let i = 0; i < data.length; i += 4) {
            const dr = Math.abs(data[i] - r);
            const dg = Math.abs(data[i+1] - g);
            const db = Math.abs(data[i+2] - b);
            
            if (dr < tol && dg < tol && db < tol) {
                data[i+3] = 0; // Torna o Alpha 0 (Transparente)
            }
        }
        ctx.putImageData(imageData, 0, 0);
    };
}

async function initAI() {

    selfieSegmentation = new SelfieSegmentation({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`

}

async function runNeuralPurge() {
    const imgUrl = document.getElementById('e-image').value;
    const status = document.getElementById('neural-status');
    const btn = document.getElementById('btn-neural');

    if (!imgUrl) return alert("Enter image URL first.");

    try {
        status.style.display = 'block';
        status.innerText = "> DOWNLOADING NEURAL WEIGHTS...";
        btn.disabled = true;

        await initAI();
        
        const img = new Image();
        img.crossOrigin = "anonymous";
        
        img.onload = async function() {
            status.innerText = "> RUNNING PIXEL SEGMENTATION...";
            
            // Criamos um canvas temporário para o processamento
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;

            // Executa a IA na imagem
            selfieSegmentation.onResults((results) => {
                // Limpa o canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Desenha a máscara (silhueta)
                ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
                
                // Modo "Composição": Mantém apenas o que está dentro da máscara
                ctx.globalCompositeOperation = 'source-in';
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                // Exporta o resultado
                const finalBase64 = canvas.toDataURL("image/png");
                document.getElementById('e-image').value = finalBase64;
                document.getElementById('e-preview-small').src = finalBase64;
                
                status.innerText = "> SCAN COMPLETE. TARGET ISOLATED.";
                btn.disabled = false;
            });

            await selfieSegmentation.send({ image: img });
        };

        img.onerror = () => {
            alert("CORS ERROR: Source website blocks AI scanning. Try downloading the image and using a local path.");
            btn.disabled = false;
        };

        img.src = imgUrl;

    } catch (e) {
        console.error(e);
        status.innerText = "> ERROR: NEURAL FAILURE.";
        btn.disabled = false;
    }
}
