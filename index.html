<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL DATABASE - V2</title>
    <style>
        :root { 
            --accent: #00d4ff; 
            --accent-glow: rgba(0, 212, 255, 0.2);
            --bg: #0b0e14; 
            --surface: #161b22; 
            --text: #e6edf3; 
            --text-dim: #8b949e;
            --border: #30363d;
            --success: #238636;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Efeito de Profundidade no Fundo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1a2332 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; text-transform: uppercase; }

        .tabs { display: flex; gap: 8px; background: var(--surface); padding: 5px; border-radius: 10px; border: 1px solid var(--border); }
        .tab-link { 
            background: transparent; border: none; color: var(--text-dim); 
            padding: 8px 18px; cursor: pointer; font-size: 0.75rem; 
            font-weight: 700; text-transform: uppercase; border-radius: 8px; transition: 0.2s;
        }
        .tab-link.active { background: var(--bg); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        .header-actions { display: flex; gap: 10px; }
        .nav-btn { 
            text-decoration: none; border: 1px solid var(--border); padding: 6px 12px; 
            color: var(--text); font-size: 0.75rem; border-radius: 6px; background: var(--surface);
            transition: 0.2s; cursor: pointer; text-transform: uppercase; font-weight: bold;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .controls { 
            display: flex; gap: 15px; margin-bottom: 25px; align-items: center; 
            background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border);
        }
        input, select { 
            background: var(--bg); border: 1px solid var(--border); color: var(--text); 
            padding: 10px 15px; border-radius: 8px; outline: none; font-size: 0.85rem;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        /* TABELAS MODERNAS */
        .view-list { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .view-list th { text-align: left; padding: 10px 15px; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .view-list td { padding: 14px 15px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .view-list td:first-child { border-left: 1px solid var(--border); border-radius: 10px 0 0 10px; }
        .view-list td:last-child { border-right: 1px solid var(--border); border-radius: 0 10px 10px 0; }
        .view-list tr:hover td { background: #1c2129; border-color: var(--accent); cursor: pointer; }

        /* CARDS */
        .view-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 14px; 
            padding: 12px; cursor: pointer; transition: 0.3s; 
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 12px 24px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; }
        .card strong { display: block; font-size: 1rem; margin-bottom: 4px; }
        .card small { color: var(--text-dim); font-size: 0.75rem; }

        /* FILTROS */
        #filter-panel { 
            display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; margin-bottom: 20px; padding: 20px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border);
        }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: 800; }

        /* PÁGINA DE PERFIL */
        .profile-header-name { font-size: 2.2rem; font-weight: 900; margin: 15px 0; color: #fff; text-transform: uppercase; letter-spacing: -1px; }
        .profile-data-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .data-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; min-width: 130px; text-align: center;
        }
        .data-card label { display: block; font-size: 0.6rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .data-card span { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .profile-main { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
        .profile-img-large { width: 100%; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .profile-bio { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; min-height: 400px; }

        .back-btn { 
            display: inline-block; text-decoration: none; color: var(--text); background: var(--surface);
            border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* RANKING */
        .ranking-container { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .rank-card { 
            flex: 1; min-width: 110px; background: #0d1117; border: 1px solid var(--border);
            border-left: 3px solid var(--accent); padding: 12px; border-radius: 8px;
        }
        .rank-card label { display: block; font-size: 0.55rem; color: var(--accent); font-weight: 800; margin-bottom: 4px; }
        .rank-card span { font-size: 1.1rem; font-weight: 800; color: #fff; }
        .rank-card small { display: block; font-size: 0.6rem; color: var(--text-dim); }

        /* TABELA DE CENAS DENTRO DO PERFIL */
        .scene-table { width: 100%; border-collapse: collapse; }
        .scene-table th { text-align: left; font-size: 0.65rem; color: var(--text-dim); padding: 10px; border-bottom: 1px solid var(--border); }
        .scene-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .scene-link { color: var(--accent); text-decoration: none; font-weight: 600; cursor: pointer; }
        .scene-link:hover { text-decoration: underline; }

        /* BUSCA LINKS */
        .search-links { display: flex; gap: 6px; }
        .search-links a { 
            text-decoration: none; color: var(--text); background: var(--bg); border: 1px solid var(--border);
            padding: 4px 10px; font-size: 0.7rem; border-radius: 4px; font-weight: bold;
        }
        .search-links a:hover { border-color: var(--accent); color: var(--accent); }

        /* MODAIS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 2000;
            display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: var(--surface); border: 1px solid var(--accent); padding: 30px; 
            width: 600px; border-radius: 20px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .modal-header { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.65rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .btn-cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 12px 25px; border-radius: 8px; cursor: pointer; }

        /* UTILITÁRIOS */
        .hidden { display: none !important; }
        .similar-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
        .similar-title { font-size: 0.8rem; font-weight: 900; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .similar-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; cursor: pointer; text-align: center; }
        .similar-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
        .similar-item span { display: block; font-size: 0.7rem; margin-top: 5px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        @media (max-width: 800px) {
            .profile-main { grid-template-columns: 1fr; }
            .profile-img-large { max-width: 300px; margin: 0 auto; }
        }
/* Container Geral dos Cards */
.profile-stats-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 30px;
}

/* Linhas de Cards */
.stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* Estilo Base dos Cards */
.stat-box {
    flex: 1;
    min-width: 120px;
    padding: 10px;
    border-radius: 4px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: rgba(0, 0, 0, 0.2);
}

/* Estilo CIANO (Ranks) */
.box-teal {
    border: 1px solid #008b8b;
}
.box-teal label { color: #00ffff; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
.box-teal span { color: #fff; font-size: 1.4rem; font-weight: 800; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
.box-teal small { color: #2e8b57; font-size: 0.6rem; margin-top: 3px; }

/* Estilo VERDE (Dados) */
.box-green {
    border: 1px solid #006400;
    max-width: 180px; /* Dados ficam mais compactos */
}
.box-green label { color: #32cd32; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.box-green span { color: #32cd32; font-size: 1.4rem; font-weight: 800; }
        
    </style>
</head>
<body>

    <div id="main-page">
        <header>
            <h1>CENTRAL DATABASE</h1>
            <div class="tabs">
                <button id="tab-actrisses" class="tab-link active" onclick="switchMainTab('actrisses')">Actresses</button>
                <button id="tab-scenes" class="tab-link" onclick="switchMainTab('scenes')">Scenes</button>
            </div>
            <div class="header-actions">
                <a href="zrobot.html" class="nav-btn" title="Add Actress">+SHE</a>
                <a href="zrobotVids.html" class="nav-btn" title="Add Video">+VID</a>
                <button onclick="toggleEditMode()" id="btnEditMode" class="nav-btn">Edit ✎</button>
                <button id="btnExport" onclick="exportData()" class="nav-btn hidden" style="color:var(--accent)">Backup</button>
            </div>
        </header>

        <div class="controls">
            <div style="flex:1"><input type="text" id="searchInput" onkeyup="render()" placeholder="Search names, studios, cast..." style="width:100%; box-sizing:border-box;"></div>
            <button onclick="toggleFilters()">Filters</button>
            <div class="tabs" style="padding:3px">
                <button id="btnList" onclick="setView('list')" class="tab-link active" style="padding:6px 12px; font-size:0.65rem">List</button>
                <button id="btnCard" onclick="setView('card')" class="tab-link" style="padding:6px 12px; font-size:0.65rem">Cards</button>
            </div>
        </div>

        <div id="filter-panel">
            <div class="filter-group"><label>Age</label>
                <select id="f-age" onchange="render()"><option value="">ALL</option><option value="<20">&lt;20</option><option value="21-25">21-25</option><option value="26-30">26-30</option><option value="31-40">31-40</option><option value=">41">&gt;41</option></select>
            </div>
            <div class="filter-group"><label>Origin</label><select id="f-origin" onchange="render()"><option value="">ALL</option></select></div>
            <div class="filter-group"><label>Ethnicity</label><select id="f-ethnicity" onchange="render()"><option value="">ALL</option></select></div>
            <div class="filter-group"><label>Hair</label><select id="f-hair" onchange="render()"><option value="">ALL</option></select></div>
            <button onclick="resetFilters()" style="grid-column: 1/-1; background:transparent; border-color:var(--border); color:var(--text-dim)">Reset Filters</button>
        </div>

        <div id="content"></div>
    </div>

    <div id="profile-page" class="hidden">
        <a href="#" class="back-btn" onclick="goBack(event)">← Back to List</a>
        <div id="profile-content"></div>
    </div>

    <div id="scene-detail-page" class="hidden">
        <a href="#" class="back-btn" onclick="goBack(event)">← Back to List</a>
        <div id="scene-detail-content"></div>
    </div>

    <!-- MODAL EDIÇÃO -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">Edit Record</div>
            <div class="form-grid">
                <div class="form-group"><label>Name</label><input id="e-name"></div>
                <div class="form-group"><label>Born (DD/MM/YYYY)</label><input id="e-born"></div>
                <div class="form-group"><label>Origin</label><input id="e-birthplace"></div>
                <div class="form-group"><label>Score</label><input id="e-total" type="number"></div>
                <div class="form-group"><label>Measurements</label><input id="e-measurements"></div>
                <div class="form-group"><label>Height (cm)</label><input id="e-height"></div>
                <div class="form-group"><label>Weight (kg)</label><input id="e-weight"></div>
                <div class="form-group"><label>Hair Color</label><input id="e-hair"></div>
                <div class="form-group"><label>Ethnicity</label><input id="e-ethnicity"></div>
                <div class="form-group"><label>Eye Color</label><input id="e-eyes"></div>
                <div class="form-group"><label>Tattoos</label><select id="e-tattoos"><option value="false">NO</option><option value="true">YES</option></select></div>
                <div class="form-group"><label>Piercings</label><select id="e-piercings"><option value="false">NO</option><option value="true">YES</option></select></div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Image URL</label>
                    <input id="e-image">
                </div>
            </div>
            <input type="hidden" id="e-index">
            <input type="hidden" id="e-position">
            <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="saveFromModal()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO GITHUB
        const GITHUB_USER = 'dadynapoleao';
        const GITHUB_REPO = 'babefire';
        const GITHUB_PATH = 'js/she.json'; 
        const _p1 = 'github_pat_11BPT5HSQ02ZefY9Hnjn3Y_';
        const _p2 = '9sB2cIGRGSL1IXsHhYNQIF1ez6CPBwNAM84y';
        const _p3 = 'PaZknPrAJEXPPJYAQ4StLA0';
        const GITHUB_TOKEN = _p1 + _p2 + _p3;

        let database = [];
        let sceneDatabase = [];
        let currentMainTab = 'actrisses';
        let currentView = 'list';
        let isEditMode = false;
        let sortCol = 'Name';
        let sortAsc = true;

        // CARREGAR DADOS
        async function loadData() {
            try {
                const resShe = await fetch('js/she.json?t=' + Date.now());
                database = await resShe.json();
                const resScene = await fetch('js/scene.json?t=' + Date.now());
                sceneDatabase = await resScene.json();
                populateFilterOptions();
                handleRouting();
            } catch (e) { 
                document.getElementById('content').innerHTML = "<p style='color:red'>Erro ao carregar banco de dados.</p>"; 
            }
        }

        function calculateAge(dateString) {
            if (!dateString || dateString === "---") return "??";
            const parts = dateString.split('/');
            if(parts.length < 3) return "??";
            const birthDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tab.toLowerCase());
            });
            render();
        }

        function setView(view) {
            currentView = view;
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            document.getElementById('btnCard').classList.toggle('active', view === 'card');
            render();
        }

        function toggleFilters() {
            const p = document.getElementById('filter-panel');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function resetFilters() {
            document.querySelectorAll('#filter-panel select').forEach(s => s.value = "");
            document.getElementById('searchInput').value = "";
            render();
        }

        function populateFilterOptions() {
            const getUnique = (field) => [...new Set(database.map(item => item[field]))].filter(Boolean).sort();
            const fillSelect = (id, field) => {
                const select = document.getElementById(id);
                getUnique(field).forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val; opt.innerText = val;
                    select.appendChild(opt);
                });
            };
            fillSelect('f-ethnicity', 'Ethnicity');
            fillSelect('f-hair', 'Hair color');
            fillSelect('f-origin', 'Birthplace');
        }

        // RENDERIZAÇÃO
        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('content');
            
            if (currentMainTab === 'actrisses') {
                renderActresses(query, container);
            } else {
                renderScenes(query, container);
            }
        }

     function renderActresses(query, container) {
    const fAge = document.getElementById('f-age').value;
    const fOrigin = document.getElementById('f-origin').value;
    const fEth = document.getElementById('f-ethnicity').value;
    const fHair = document.getElementById('f-hair').value;

    // 1. Filtragem
    let filtered = database.filter(item => {
        const age = calculateAge(item.Born);
        let mAge = true;
        if (fAge === "<20") mAge = age < 20;
        else if (fAge === "21-25") mAge = age >= 21 && age <= 25;
        else if (fAge === "26-30") mAge = age >= 26 && age <= 30;
        else if (fAge === "31-40") mAge = age >= 31 && age <= 40;
        else if (fAge === ">41") mAge = age >= 41;

        return (item.Name || "").toLowerCase().includes(query) && mAge &&
               (fEth === "" || item.Ethnicity === fEth) &&
               (fHair === "" || item['Hair color'] === fHair) &&
               (fOrigin === "" || item.Birthplace === fOrigin);
    });

    // 2. Ordenação (Sort)
    filtered.sort((a, b) => {
        let valA, valB;
        if (sortCol === 'Age') {
            valA = calculateAge(a.Born); valB = calculateAge(b.Born);
            if (valA === "??") valA = 0; if (valB === "??") valB = 0;
        } else if (sortCol === 'Score') {
            valA = a.Total || 0; valB = b.Total || 0;
        } else if (sortCol === 'Origin') {
            valA = (a.Birthplace || "").toLowerCase(); valB = (b.Birthplace || "").toLowerCase();
        } else {
            valA = (a[sortCol] || "").toLowerCase(); valB = (b[sortCol] || "").toLowerCase();
        }

        if (valA < valB) return sortAsc ? -1 : 1;
        if (valA > valB) return sortAsc ? 1 : -1;
        return 0;
    });

    const arrow = (col) => sortCol === col ? (sortAsc ? ' ↑' : ' ↓') : '';

    if (currentView === 'list') {
        let html = `<table class="view-list"><thead><tr>
            <th onclick="sortBy('Name')" style="cursor:pointer">Name${arrow('Name')}</th>
            <th onclick="sortBy('Age')" style="cursor:pointer">Age${arrow('Age')}</th>
            <th onclick="sortBy('Origin')" style="cursor:pointer">Origin${arrow('Origin')}</th>
            <th onclick="sortBy('Score')" style="cursor:pointer">Score${arrow('Score')}</th>
            <th onclick="sortBy('Measurements')" style="cursor:pointer">Measurements${arrow('Measurements')}</th>
        </tr></thead><tbody>`;
        
        filtered.forEach(item => {
            html += `<tr onclick="handleRowClick('${item.Name}')">
                <td style="font-weight:bold; color:var(--accent)">${item.Name}</td>
                <td>${calculateAge(item.Born)}</td>
                <td>${item.Birthplace || '---'}</td>
                <td style="font-weight:800">${item.Total || 0}</td>
                <td>${item.Measurements || '---'}</td></tr>`;
        });
        container.innerHTML = html + `</tbody></table>`;
    } else {
        let html = `<div class="view-cards">`;
        filtered.forEach(item => {
            html += `<div class="card" onclick="handleRowClick('${item.Name}')">
                <img src="${item.Image || 'https://via.placeholder.com/300x160?text=NO+IMAGE'}" style="object-position:${item.ImagePosition || 'center'}">
                <strong>${item.Name}</strong>
                <small>Score: ${item.Total || 0} | Age: ${calculateAge(item.Born)}</small></div>`;
        });
        container.innerHTML = html + `</div>`;
    }
}

        function renderScenes(query, container) {
            let filtered = sceneDatabase.filter(s => 
                s.Name.toLowerCase().includes(query) || 
                (s.Cast && s.Cast.toLowerCase().includes(query)) ||
                (s.Studio && s.Studio.toLowerCase().includes(query))
            );
            filtered.sort((a, b) => parseDate(b["Release date"]) - parseDate(a["Release date"]));
            const limited = filtered.slice(0, 100);

            if (currentView === 'list') {
                let html = `<table class="view-list"><thead><tr><th>Scene Name</th><th>Studio</th><th>Release</th><th>Cast</th></tr></thead><tbody>`;
                limited.forEach(s => {
                    html += `<tr onclick="openScene('${encodeURIComponent(s.Name)}')">
                        <td style="font-weight:bold; color:var(--accent)">${s.Name}</td>
                        <td>${s.Studio}</td>
                        <td>${s["Release date"]}</td>

        function handleRouting() {
            const h = window.location.hash;
            document.getElementById('main-page').classList.remove('hidden');
            document.getElementById('profile-page').classList.add('hidden');
            document.getElementById('scene-detail-page').classList.add('hidden');

            if (h.startsWith('#profile=')) {
                const p = database.find(x => x.Name === decodeURIComponent(h.split('=')[1]));
                if (p) showProfilePage(p);
            } else if (h.startsWith('#scene=')) {
                const s = sceneDatabase.find(x => x.Name === decodeURIComponent(h.split('=')[1]));
                if (s) showSceneDetailPage(s);
            } else {
                render();
            }
        }

        async function syncToGitHub() {
            try {
                const getFile = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const fileData = await getFile.json();
                const sha = fileData.sha;
                const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(database, null, 4))));
                await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update via Database V2", content: newContent, sha: sha })
                });
                console.log("Sync OK");
            } catch (err) { console.error("Sync Error", err); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(database, null, 4)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "she.json"; a.click();
        }

    function calculateAllRanks(currentShe) {
    const list = [...database];
    const countryList = list.filter(a => a.Birthplace === currentShe.Birthplace);

    const parseM = (m) => {
        if (!m) return [0, 0, 0];
        const parts = m.match(/\d+/g);
        return parts ? parts.map(Number) : [0, 0, 0];
    };

    const getPos = (arr, name, valFn) => {
        const sorted = [...arr].sort((a, b) => valFn(b) - valFn(a));
        return sorted.findIndex(a => a.Name === name) + 1;
    };

    return {
        global: getPos(list, currentShe.Name, a => parseFloat(a.Total || 0)),
        totalGlobal: list.length,
        country: currentShe.Birthplace ? getPos(countryList, currentShe.Name, a => parseFloat(a.Total || 0)) : 'N/A',
        totalCountry: countryList.length,
        score: currentShe.Total || 0,
        boobs: getPos(list, currentShe.Name, a => parseM(a.Measurements)[0]),
        ass: getPos(list, currentShe.Name, a => parseM(a.Measurements)[2]),
        hips: getPos(list, currentShe.Name, a => parseM(a.Measurements)[2])
    };
}
