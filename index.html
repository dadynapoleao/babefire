<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - ARCHIVE SYSTEM</title>
    <style>
        :root { --glow: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Efeito de Scanline */
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; pointer-events: none; z-index: 1000; }

        header { border-bottom: 2px solid var(--glow); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.5rem; }
        
        .tabs { display: flex; gap: 10px; }
        .tab-link { background: transparent; border: 1px solid rgba(0, 255, 65, 0.3); color: var(--glow); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.8rem; text-transform: uppercase; }
        .tab-link.active { background: var(--glow); color: #000; box-shadow: 0 0 10px var(--glow); font-weight: bold; }

        .controls { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; border: 1px dashed rgba(0, 255, 65, 0.3); padding: 15px; }
        input, select { background: #000; border: 1px solid var(--glow); color: var(--glow); padding: 8px; outline: none; font-family: inherit; }
        button { background: transparent; border: 1px solid var(--glow); color: var(--glow); cursor: pointer; padding: 8px 15px; font-family: inherit; text-transform: uppercase; }
        button:hover { background: var(--glow); color: #000; }
        button.active { background: var(--glow); color: #000; }

        /* FILTROS */
        #filter-panel { display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 15px; border: 1px solid var(--glow); background: rgba(0, 255, 65, 0.05); }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }

        /* TABELAS */
        .view-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .view-list th { text-align: left; border-bottom: 1px solid var(--glow); padding: 10px; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; }
        .view-list td { padding: 10px; border-bottom: 1px solid rgba(0, 255, 65, 0.2); font-size: 0.85rem; }
        .view-list tr:hover td { background: rgba(0, 255, 65, 0.1); color: #fff; cursor: pointer; }

        /* CARDS */
        .view-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid var(--glow); padding: 15px; cursor: pointer; transition: 0.2s; background: #000; }
        .card:hover { box-shadow: 0 0 15px var(--glow); background: rgba(0, 255, 65, 0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border: 1px solid var(--glow); margin-bottom: 10px; filter: grayscale(1) brightness(0.8); }

        /* DETALHES (PERFIL E CENA) */
        #profile-page, #scene-detail-page { display: none; }
        .profile-header-name { font-size: 2.5rem; margin: 10px 0; border-bottom: 1px solid var(--glow); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 5px; }
        .profile-data-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .data-card { border: 1px solid var(--glow); padding: 10px 20px; background: rgba(0, 255, 65, 0.05); min-width: 100px; display: flex; flex-direction: column; align-items: center; }
        .data-card label { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; }
        .data-card span { font-size: 1.1rem; font-weight: bold; }

        .profile-main { display: flex; gap: 30px; margin-top: 20px; }
        .profile-img-large { width: 350px; border: 1px solid var(--glow); box-shadow: 0 0 20px var(--glow); }
        .profile-bio { flex: 1; border: 1px dashed rgba(0, 255, 65, 0.3); padding: 20px; font-size: 0.9rem; line-height: 1.6; max-height: 600px; overflow-y: auto; }

        .back-btn { margin-bottom: 20px; display: inline-block; text-decoration: none; color: var(--glow); border: 1px solid var(--glow); padding: 5px 15px; text-transform: uppercase; }
        .back-btn:hover { background: var(--glow); color: #000; }

        .search-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .search-links a { text-decoration: none; color: var(--glow); border: 1px solid rgba(0, 255, 65, 0.5); padding: 4px 10px; font-size: 0.75rem; }
        .search-links a:hover { background: var(--glow); color: #000; }

        .hidden { display: none !important; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: var(--glow); animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Tabela de cenas dentro do perfil */
        .scene-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .scene-table th { text-align: left; border-bottom: 1px solid var(--glow); font-size: 0.7rem; opacity: 0.7; padding: 5px; }
        .scene-table td { padding: 8px 5px; border-bottom: 1px solid rgba(0, 255, 65, 0.1); font-size: 0.8rem; }


        .cast-link { 
    color: var(--glow); 
    text-decoration: underline; 
    font-weight: bold; 
    cursor: pointer;
}
.cast-link:hover {
    background: var(--glow);
    color: #000;
}

.scene-link { 
    color: var(--glow); 
    text-decoration: underline; 
    cursor: pointer; 
}
.scene-link:hover { 
    background: var(--glow); 
    color: #000; 
}

.external-link { 
    color: #888; /* Cor mais discreta para indicar que é externo */
    font-size: 0.7rem;
    text-decoration: none;
    margin-left: 5px;
    border: 1px solid #444;
    padding: 0 4px;
    border-radius: 3px;
    vertical-align: middle;
}
.external-link:hover { 
    background: #ff9900; /* Laranja Babepedia ao passar o mouse */
    color: #000;
    border-color: #ff9900;
}

.btn-primary-search {
    border-color: #00ffff !important;
    color: #00ffff !important;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 15px;
}
.btn-primary-search:hover {
    background: #00ffff !important;
    color: #000 !important;
}


    </style>
</head>
<body>

    <!-- MAIN PAGE -->
    <div id="main-page">
        <header>
            <h1>CENTRAL DATABASE</h1>
            <div class="tabs">
                <button id="tab-actrisses" class="tab-link active" onclick="switchMainTab('actrisses')">ACTRISSES</button>
                <button id="tab-scenes" class="tab-link" onclick="switchMainTab('scenes')">SCENES</button>
            </div>
            <span>STATUS: ONLINE <span class="cursor"></span></span>
        </header>

        <div class="controls">
            <div><label>> SEARCH:</label> <input type="text" id="searchInput" onkeyup="render()" placeholder="Search names, studios..."></div>
            <button id="filter-toggle-btn" onclick="toggleFilters()">[+] FILTERS</button>
            <div style="margin-left: auto;">
                <button id="btnList" onclick="setView('list')" class="active">LIST</button>
                <button id="btnCard" onclick="setView('card')">CARDS</button>
            </div>
        </div>

        <div id="filter-panel">
            <div class="filter-group"><label>Age</label>
                <select id="f-age" onchange="render()"><option value="">ALL</option><option value="<20"><20</option><option value="21-25">21-25</option><option value="26-30">26-30</option><option value="31-40">31-40</option><option value=">41">>41</option></select>
            </div>
            <div class="filter-group"><label>Origin</label><select id="f-origin" onchange="render()"><option value="">ALL</option></select></div>
            <div class="filter-group"><label>Ethnicity</label><select id="f-ethnicity" onchange="render()"><option value="">ALL</option></select></div>
            <div class="filter-group"><label>Hair</label><select id="f-hair" onchange="render()"><option value="">ALL</option></select></div>
            <button onclick="resetFilters()" style="grid-column: 1/-1;">RESET ALL</button>
        </div>

        <div id="content"></div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profile-page">
        <a href="#" class="back-btn" onclick="goBack(event)">[ BACK ]</a>
        <div id="profile-content"></div>
    </div>

    <!-- SCENE DETAIL PAGE -->
    <div id="scene-detail-page">
        <a href="#" class="back-btn" onclick="goBack(event)">[ BACK ]</a>
        <div id="scene-detail-content"></div>
    </div>

    <script>
        let database = [];
        let sceneDatabase = [];
        let currentMainTab = 'actrisses';
        let currentView = 'list';
        let sortCol = 'Name';
        let sortAsc = true;

        // --- HELPERS ---
        function calculateAge(dateString) {
            if (!dateString) return 0;
            const parts = dateString.split('/');
            const birthDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        // --- DATA LOADING ---
        async function loadData() {
            try {
                const resShe = await fetch('js/she.json?t=' + Date.now());
                database = await resShe.json();
                
                try {
                    const resScene = await fetch('js/scene.json?t=' + Date.now());
                    sceneDatabase = await resScene.json();
                } catch (e) { console.warn("scene.json not found"); }

                populateFilterOptions();
                handleRouting();
            } catch (e) { 
                document.getElementById('content').innerHTML = "> CRITICAL ERROR LOADING DATABASE"; 
            }
        }

        function populateFilterOptions() {
            const getUnique = (field) => [...new Set(database.map(item => item[field]))].filter(Boolean).sort();
            const fillSelect = (id, field) => {
                const select = document.getElementById(id);
                getUnique(field).forEach(val => select.innerHTML += `<option value="${val}">${val}</option>`);
            };
            fillSelect('f-ethnicity', 'Ethnicity');
            fillSelect('f-hair', 'Hair color');
            fillSelect('f-origin', 'Birthplace');
        }

        // --- NAVIGATION & TABS ---
        function switchMainTab(tab) {
            currentMainTab = tab;
            document.querySelectorAll('.tab-link').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tab.toLowerCase());
            });
            
            // Ajustar controles
            document.getElementById('filter-toggle-btn').style.display = (tab === 'scenes') ? 'none' : 'inline-block';
            document.getElementById('filter-panel').style.display = 'none';
            
            render();
        }

        function setView(view) {
            currentView = view;
            document.getElementById('btnList').classList.toggle('active', view === 'list');
            document.getElementById('btnCard').classList.toggle('active', view === 'card');
            render();
        }

        function toggleFilters() {
            const p = document.getElementById('filter-panel');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function resetFilters() {
            document.querySelectorAll('#filter-panel select').forEach(s => s.value = "");
            document.getElementById('searchInput').value = "";
            render();
        }

        // --- RENDERING ---
        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('content');

            if (currentMainTab === 'actrisses') {
                renderActresses(query, container);
            } else {
                renderScenes(query, container);
            }
        }

        function renderActresses(query, container) {
            const fAge = document.getElementById('f-age').value;
            const fOrigin = document.getElementById('f-origin').value;
            const fEth = document.getElementById('f-ethnicity').value;
            const fHair = document.getElementById('f-hair').value;

            let filtered = database.filter(item => {
                const age = calculateAge(item.Born);
                let mAge = true;
                if (fAge === "<20") mAge = age < 20;
                else if (fAge === "21-25") mAge = age >= 21 && age <= 25;
                else if (fAge === "26-30") mAge = age >= 26 && age <= 30;
                else if (fAge === "31-40") mAge = age >= 31 && age <= 40;
                else if (fAge === ">41") mAge = age >= 41;

                return item.Name.toLowerCase().includes(query) && mAge &&
                       (fEth === "" || item.Ethnicity === fEth) &&
                       (fHair === "" || item['Hair color'] === fHair) &&
                       (fOrigin === "" || item.Birthplace === fOrigin);
            });

            if (currentView === 'list') {
                let html = `<table class="view-list"><thead><tr><th>NAME</th><th>AGE</th><th>ORIGIN</th><th>SCORE</th><th>MEASUREMENTS</th></tr></thead><tbody>`;
                filtered.forEach(item => {
                    html += `<tr onclick="openProfile('${item.Name}')">
                        <td>${item.Name}</td>
                        <td>${calculateAge(item.Born)}</td>
                        <td>${item.Birthplace}</td>
                        <td style="font-weight:bold">${item.Total}</td>
                        <td>${item.Measurements}</td></tr>`;
                });
                container.innerHTML = html + `</tbody></table>`;
            } else {
                let html = `<div class="view-cards">`;
                filtered.forEach(item => {
                    html += `<div class="card" onclick="openProfile('${item.Name}')">
                        <img src="${item.Image || 'https://via.placeholder.com/300x180?text=NO+IMAGE'}">
                        <strong>${item.Name}</strong><br>
                        <small>Score: ${item.Total} | Age: ${calculateAge(item.Born)}</small></div>`;
                });
                container.innerHTML = html + `</div>`;
            }
        }

        function renderScenes(query, container) {
            let filtered = sceneDatabase.filter(s => 
                s.Name.toLowerCase().includes(query) || 
                (s.Cast && s.Cast.toLowerCase().includes(query)) ||
                (s.Studio && s.Studio.toLowerCase().includes(query))
            );

            // Ordenar por data (Recente -> Antigo)
            filtered.sort((a, b) => parseDate(b["Release date"]) - parseDate(a["Release date"]));

            // Limite de 100
            const limited = filtered.slice(0, 100);

            if (currentView === 'list') {
                let html = `<p style="font-size:0.7rem; opacity:0.6">> SHOWING ${limited.length} MOST RECENT ENTRIES</p>
                <table class="view-list"><thead><tr><th>SCENE NAME</th><th>STUDIO</th><th>RELEASE</th><th>CAST</th></tr></thead><tbody>`;
                limited.forEach(s => {
                    html += `<tr onclick="openScene('${encodeURIComponent(s.Name)}')">
                        <td>${s.Name}</td>
                        <td>${s.Studio}</td>
                        <td style="white-space:nowrap">${s["Release date"]}</td>
                        <td style="font-size:0.7rem; opacity:0.6">${s.Cast}</td></tr>`;
                });
                container.innerHTML = html + `</tbody></table>`;
            } else {
                let html = `<div class="view-cards">`;
                limited.forEach(s => {
                    html += `<div class="card" onclick="openScene('${encodeURIComponent(s.Name)}')">
                        <img src="${s.Image || 'https://via.placeholder.com/300x180?text=SCENE+IMAGE'}">
                        <strong>${s.Name}</strong><br>
                        <small>${s.Studio} | ${s["Release date"]}</small></div>`;
                });
                container.innerHTML = html + `</div>`;
            }
        }

        // --- DETAIL PAGES ---
        function openProfile(n) { window.location.hash = `profile=${encodeURIComponent(n)}`; }
        function openScene(n) { window.location.hash = `scene=${n}`; }

      function showProfilePage(p) {
    document.getElementById('main-page').classList.add('hidden');
    document.getElementById('scene-detail-page').style.display = 'none'; // Esconde página de cena se estiver aberta
    document.getElementById('profile-page').style.display = 'block';

    // Filtrar cenas da atriz no banco de dados de cenas
    let related = sceneDatabase.filter(s => s.Cast && s.Cast.toLowerCase().includes(p.Name.toLowerCase()));
    
    // Ordenar por data (Recente -> Antigo)
    related.sort((a,b) => parseDate(b["Release date"]) - parseDate(a["Release date"]));

    let scenesHtml = `
        <table class="scene-table">
            <thead>
                <tr>
                    <th>SCENE NAME</th>
                    <th>DATE</th>
                    <th>SEARCH</th>
                </tr>
            </thead>
            <tbody>`;

related.forEach(s => {
        const qFull = encodeURIComponent(`${s.Cast} ${s.Name}`);
        const qTitle = s.Name.trim().replace(/\s+/g, '+');
        const sceneNameEncoded = encodeURIComponent(s.Name);

        scenesHtml += `
            <tr>
                <td onclick="openScene('${sceneNameEncoded}')" class="scene-link">
                    ${s.Name}
                </td>
                <td style="white-space:nowrap">${s["Release date"] || "---"}</td>
                <td>
                    <div class="search-links">
                        <!-- APSTREAM adicionado como link 'A' -->
                        <a href="https://rtv.apstream.org/?search=${qTitle}" target="_blank" title="APStream" style="color:#00ffff; border-color:#00ffff">A</a>
                        <a href="https://www.whoreshub.com/search/${qFull}/" target="_blank" title="WhoresHub">1</a>
                        <a href="https://pornmz.com/?s=${qFull}" target="_blank" title="PornMZ">2</a>
                    </div>
                </td>
            </tr>`;
    });
    
    scenesHtml += "</tbody></table>";

    document.getElementById('profile-content').innerHTML = `
        <div class="profile-header-name">${p.Name}</div>
        <div class="profile-data-row">
            <div class="data-card"><label>AGE</label><span>${calculateAge(p.Born)}</span></div>
            <div class="data-card"><label>SCORE</label><span>${p.Total}</span></div>
            <div class="data-card"><label>ORIGIN</label><span>${p.Birthplace}</span></div>
            <div class="data-card"><label>MEASUREMENTS</label><span>${p.Measurements}</span></div>
        </div>
        <div class="profile-main">
            <img src="${p.Image || 'https://via.placeholder.com/400x600?text=NO+PHOTO'}" class="profile-img-large">
            <div class="profile-bio">
                <p style="margin-top:0; color:rgba(0,255,65,0.7)">> APPEARANCES IN DATABASE (CLICK SCENE NAME FOR DETAILS):</p>
                ${related.length > 0 ? scenesHtml : '<p style="opacity:0.5">NO SCENES RECORDED.</p>'}
            </div>
        </div>`;
}

function showSceneDetailPage(s) {
    document.getElementById('main-page').classList.add('hidden');
    document.getElementById('scene-detail-page').style.display = 'block';

    // Formatações de busca
    const titleOnlyQuery = s.Name.trim().replace(/\s+/g, '+'); // Para APStream
    const fullQuery = encodeURIComponent(`${s.Cast} ${s.Name}`); // Para os outros

    const apStreamUrl = `https://rtv.apstream.org/?search=${titleOnlyQuery}`;

    // Lógica do Cast (mesma de antes)
    const castNames = s.Cast.split(',').map(name => name.trim());
    const linkedCast = castNames.map(name => {
        const actressExists = database.find(a => a.Name.toLowerCase() === name.toLowerCase());
        if (actressExists) {
            return `<a href="#profile=${encodeURIComponent(actressExists.Name)}" class="cast-link">${name}</a>`;
        } else {
            const babepediaFormat = name.replace(/\s+/g, '_');
            return `<span>${name}<a href="https://www.babepedia.com/babe/${babepediaFormat}" target="_blank" class="external-link" title="Babepedia">[B]</a></span>`;
        }
    }).join(', ');

    document.getElementById('scene-detail-content').innerHTML = `
        <div class="profile-header-name">${s.Name}</div>
        <div class="profile-data-row">
            <div class="data-card"><label>STUDIO</label><span>${s.Studio}</span></div>
            <div class="data-card"><label>DATE</label><span>${s["Release date"]}</span></div>
            <div class="data-card"><label>MOVIE</label><span>${s.Movie || '---'}</span></div>
        </div>
        <div class="profile-main">
            <img src="${s.Image || 'https://via.placeholder.com/500x300?text=NO+IMAGE'}" class="profile-img-large">
            <div class="profile-bio">
                
                <p>> TITULAR SEARCH (BY SCENE NAME):</p>
                <div class="search-links">
                    <a href="${apStreamUrl}" target="_blank" class="btn-primary-search">[!] APSTREAM (DIRECT TITLE SEARCH)</a>
                </div>

                <p style="margin-top:20px">> CAST:</p>
                <div style="font-size:1.3rem; margin-bottom:20px; line-height:2.2;">
                    ${linkedCast}
                </div>
                
                <p>> WEB SEARCH ENGINE LINKS (FULL QUERY):</p>
                <div class="search-links">
                    <a href="https://www.whoreshub.com/search/${fullQuery}/" target="_blank">WHORESHUB</a>
                    <a href="https://pornmz.com/?s=${fullQuery}" target="_blank">PORNMZ</a>
                    <a href="https://noodlemagazine.com/video/${fullQuery}" target="_blank">NOODLEMAG</a>
                    <a href="https://www.trendyporn.com/search/${fullQuery}/" target="_blank">TRENDYPORN</a>
                </div>
            </div>
        </div>`;
}



        // --- ROUTING ---
        function handleRouting() {
            const h = window.location.hash;
            document.getElementById('main-page').classList.remove('hidden');
            document.getElementById('profile-page').style.display = 'none';
            document.getElementById('scene-detail-page').style.display = 'none';

            if (h.startsWith('#profile=')) {
                const p = database.find(x => x.Name === decodeURIComponent(h.split('=')[1]));
                if (p) showProfilePage(p);
            } else if (h.startsWith('#scene=')) {
                const s = sceneDatabase.find(x => x.Name === decodeURIComponent(h.split('=')[1]));
                if (s) showSceneDetailPage(s);
            } else {
                render();
            }
        }

        function goBack(e) { e.preventDefault(); window.location.hash = ""; }

        window.addEventListener('hashchange', handleRouting);
        loadData();
    </script>
</body>
</html>
